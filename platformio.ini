; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common settings for all ESP32 environments
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; ============================================================================
; RECEIVER (Motor Control ESP32)
; MAC: 48:E7:29:B6:70:9C
; This is the ESP32 connected to the stepper motor and sensors
; Build: pio run -e receiver
; Upload: pio run -e receiver --target upload
; ============================================================================
[env:receiver]
build_flags = -DRECEIVER_BUILD
build_src_filter = +<*> -<main_sender.cpp>
lib_deps =
    waspinator/AccelStepper@^1.64
    robtillaart/AS5600@^0.6.1
    teemuatlut/TMCStepper@^0.7.3

; ============================================================================
; SENDER (Remote Control ESP32)
; MAC: 00:70:07:1d:06:f4
; This is the ESP32 with joystick and buttons for wireless control
; Build: pio run -e sender
; Upload: pio run -e sender --target upload
; ============================================================================
[env:sender]
build_flags = -DSENDER_BUILD
build_src_filter =
    +<ESPNowComm.cpp>
    +<main_sender.cpp>
    -<main.cpp>
    -<MotorControl.cpp>
    -<MarkerSystem.cpp>
    -<StateMachine.cpp>
    -<EncoderReader.cpp>

; ============================================================================
; Legacy environment (for backward compatibility)
; ============================================================================
[env:esp32dev]
lib_deps =
    waspinator/AccelStepper@^1.64
    robtillaart/AS5600@^0.6.1
    teemuatlut/TMCStepper@^0.7.3
